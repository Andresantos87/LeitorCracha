name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configura Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configura Android SDK
        uses: android-actions/setup-android@v3

      - name: Cria local.properties com caminho do SDK
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Instala Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Builda o APK (debug)
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Faz upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: LeitorCracha-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
